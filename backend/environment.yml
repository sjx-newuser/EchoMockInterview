name: mock-interview
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  
  # 系统级底层依赖 
  - ffmpeg
  - libsndfile
  
  # PyTorch 核心与 CUDA 支持 (精准拉取 12.1 版本)
  - pytorch
  - torchaudio
  - pytorch-cuda=12.1
  
  # 科学计算基础
  - numpy
  - scipy
  
  - pip
  - pip:
      # Web 框架
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.29.0
      - websockets>=12.0
      - python-multipart>=0.0.9
      - pydantic-settings>=2.2.1
      
      # 数据库 (替换为 SQLite 的异步驱动)
      - sqlalchemy[asyncio]>=2.0.29
      - aiosqlite>=0.20.0
      - chromadb>=0.4.24
      
      # AI 与音频业务层
      - funasr>=1.0.26
      - modelscope>=1.13.0
      - librosa>=0.10.1
      - google-genai>=0.6.0
      - llama-index>=0.10.0
      - llama-index-embeddings-openai>=0.1.0
      - llama-index-vector-stores-chroma>=0.1.0
      - celery>=5.3.0
      
      # 安全与认证
      - python-jose[cryptography]>=3.3.0
      - passlib>=1.7.4
      - bcrypt<4.0.0
      
      # 测试与辅助工具
      - pytest>=7.0.0
      - pytest-asyncio>=0.21.0
      - httpx>=0.27.0