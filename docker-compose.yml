version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Optional: Mount a directory for persistent data, like sqlite DB or chroma
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # Add necessary environment variables here (.env file also works)

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    # Runs Vite development server
    command: bash -c "npm install -g pnpm && pnpm install && pnpm dev --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
