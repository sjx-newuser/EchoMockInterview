version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./backend/scripts:/app/scripts
      # Prevent host node_modules (if any) from overriding container ones if there were any, 
      # but backend doesn't use node_modules, it uses pip.
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PROJECT_ROOT=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to preserve container node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
